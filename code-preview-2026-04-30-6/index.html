<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碎钻 Bokeh - 升腾版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050A0F; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

        .phone-shell {
            width: 375px; height: 780px;
            background: linear-gradient(160deg, #5A8F9B 0%, #1B2D35 40%, #081115 100%);
            border-radius: 54px;
            position: relative;
            overflow: hidden;
            border: 8px solid #1A1A1A;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.8);
        }

        /* --- 背景：碎钻光斑 (保持你喜欢的样式) --- */
        .bokeh {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.1);
            animation: move infinite ease-in-out alternate;
        }

        .gold {
            background: rgba(255, 230, 150, 0.05);
            border-color: rgba(255, 220, 120, 0.3);
            box-shadow: inset 0 0 8px rgba(255, 200, 50, 0.1);
        }

        /* 碎钻尺寸 */
        .tiny { width: 12px; height: 12px; opacity: 0.6; filter: blur(1px); }
        .small { width: 25px; height: 25px; opacity: 0.4; filter: blur(2px); }
        .medium { width: 55px; height: 55px; opacity: 0.3; filter: blur(3px); }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); opacity: 0.2; }
            50% { opacity: 0.6; }
            100% { transform: translate(15px, 25px) scale(1.1); opacity: 0.3; }
        }

        /* 手动排布光斑 */
        .p1 { top: 15%; left: 10%; animation-duration: 7s; }
        .p2 { top: 25%; left: 60%; animation-duration: 9s; animation-delay: -1s; }
        .p3 { top: 45%; left: 25%; animation-duration: 11s; }
        .p4 { top: 10%; left: 80%; animation-duration: 8s; animation-delay: -3s; }
        .p5 { bottom: 20%; left: 15%; animation-duration: 12s; }
        .p6 { bottom: 35%; right: 15%; animation-duration: 6s; }
        .p7 { top: 60%; left: 50%; animation-duration: 10s; }

        /* --- 遮罩层：增加景深模糊 --- */
        .depth-mask {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(0,0,0,0.3) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* --- 前景：气泡升腾动画 --- */
        .bubble {
            position: absolute;
            z-index: 10;
            bottom: -150px; /* 从屏幕底部外开始 */
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            letter-spacing: 2px;
            border: 0.5px solid rgba(255,255,255,0.1);
            animation: riseUp var(--duration) infinite linear;
        }

        @keyframes riseUp {
            0% { 
                transform: translateY(0) translateX(0); 
                opacity: 0; 
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                transform: translateY(-900px) translateX(var(--drift)); 
                opacity: 0; 
            }
        }
    </style>
</head>
<body>

    <div class="phone-shell flex flex-col">
        <!-- 景深遮罩 -->
        <div class="depth-mask"></div>

        <!-- 背景碎钻光斑 (维持原样) -->
        <div class="absolute inset-0 z-1">
            <div class="bokeh tiny p1"></div>
            <div class="bokeh tiny gold p4"></div>
            <div class="bokeh small p2"></div>
            <div class="bokeh small gold p5"></div>
            <div class="bokeh medium gold p3"></div>
            <div class="bokeh medium p6"></div>
            <div class="bokeh medium gold p7"></div>
        </div>

        <header class="px-8 pt-12 z-20 flex justify-between items-center">
            <span class="text-white/30 text-[9px] tracking-[0.5em]">RISE BOKEH</span>
            <div class="w-1 h-1 rounded-full bg-white/40 shadow-[0_0_8px_rgba(255,255,255,0.8)]"></div>
        </header>

        <!-- 升腾的气泡：通过CSS变量设置不同的速度、位移和延迟 -->
        <div class="bubble w-24 h-24" style="left: 5%; --duration: 15s; --drift: 40px; animation-delay: 0s;">呼吸</div>
        <div class="bubble w-20 h-20" style="left: 60%; --duration: 12s; --drift: -30px; animation-delay: -5s;">潜行</div>
        <div class="bubble w-28 h-28" style="left: 30%; --duration: 20s; --drift: 20px; animation-delay: -8s;">放空</div>
        <div class="bubble w-16 h-16" style="left: 75%; --duration: 10s; --drift: -50px; animation-delay: -2s;">静谧</div>

        <footer class="mt-auto p-10 z-20">
            <div class="h-14 bg-white/5 rounded-2xl border border-white/10 backdrop-blur-md flex items-center px-6">
                <input type="text" placeholder="对话此刻..." class="bg-transparent w-full text-xs outline-none text-white/50">
            </div>
        </footer>
    </div>

</body>
</html>
