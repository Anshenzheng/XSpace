<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可嗳 K.I - 窗影放空室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 背景加深至 EAEFEF，让白色高光可见 */
        body { background-color: #CBD5E0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }

        .phone-shell {
            width: 375px;
            height: 780px;
            background: #E6EEED; /* 稍微压低亮度，模拟室内背光面 */
            border-radius: 48px;
            position: relative;
            overflow: hidden;
            border: 8px solid #FFFFFF;
            box-shadow: 0 40px 100px rgba(0,0,0,0.2);
        }

        /* 强化窗影效果：使用更深的混合模式 */
        .window-light {
            position: absolute;
            inset: -50%;
            background: repeating-linear-gradient(
                130deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0) 10%,
                rgba(255, 255, 255, 0.4) 12%,
                rgba(255, 255, 255, 0.4) 18%,
                rgba(255, 255, 255, 0) 20%
            );
            filter: blur(15px);
            pointer-events: none;
            z-index: 1;
            animation: lightShift 20s ease-in-out infinite alternate;
        }

        @keyframes lightShift {
            from { transform: translate(-5%, -5%) rotate(0deg); }
            to { transform: translate(5%, 5%) rotate(2deg); }
        }

        /* 气泡：强化白色边缘高光 */
        .mood-bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #5A6A68;
            font-size: 13px;
            font-weight: 600;
            /* 拟物核心：白色高光 + 深色投影 */
            box-shadow: 
                -5px -5px 15px rgba(255, 255, 255, 0.8), 
                5px 5px 15px rgba(160, 175, 172, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: floating 8s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes floating {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(10px, -15px); }
            66% { transform: translate(-5px, -25px); }
        }

        /* 凹陷输入框 */
        .neu-inset {
            background: #E6EEED;
            box-shadow: 
                inset 5px 5px 10px rgba(160, 175, 172, 0.5), 
                inset -5px -5px 10px rgba(255, 255, 255, 0.8);
        }

        /* 按钮悬浮感 */
        .neu-pill {
            background: #E6EEED;
            box-shadow: 
                4px 4px 10px rgba(160, 175, 172, 0.3), 
                -4px -4px 10px rgba(255, 255, 255, 0.8);
            transition: 0.3s;
        }

        .active-pill {
            background: #7ED321;
            color: white;
            box-shadow: 0 8px 20px rgba(126, 211, 33, 0.3);
        }
    </style>
</head>
<body>

    <div class="phone-shell flex flex-col">
        <!-- 窗影层 -->
        <div class="window-light"></div>

        <!-- 顶部 -->
        <header class="px-6 pt-12 pb-4 flex justify-between items-center z-10">
            <div class="flex items-center text-gray-500 text-xs font-bold opacity-70">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="mr-1"><path d="M15 18l-6-6 6-6"/></svg>
                返回首页
            </div>
            <div class="w-14 h-7 bg-white/40 rounded-full border border-white/50 flex items-center justify-around px-2">
                <div class="w-1.5 h-1.5 rounded-full bg-gray-600"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-gray-400"></div>
            </div>
        </header>

        <!-- 气泡区 -->
        <main class="flex-1 relative">
            <div class="mood-bubble w-28 h-28 top-16 left-8" style="animation-delay: 0s;">
                自我对话
            </div>
            <div class="mood-bubble w-24 h-24 top-48 right-10" style="animation-delay: -2s;">
                心如止水
            </div>
            <div class="mood-bubble w-20 h-20 bottom-40 left-12" style="animation-delay: -4s;">
                岁月温柔
            </div>
        </main>

        <!-- 底部 -->
        <footer class="px-6 pb-10 z-10">
            <div class="flex space-x-3 mb-6 overflow-x-auto no-scrollbar py-2">
                <div class="active-pill px-5 py-2 rounded-full text-[11px] font-bold flex-shrink-0">
                    😑 平静
                </div>
                <div class="neu-pill px-5 py-2 rounded-full text-[11px] font-bold text-gray-500 flex-shrink-0">
                    😊 愉悦
                </div>
                <div class="neu-pill px-5 py-2 rounded-full text-[11px] font-bold text-gray-500 flex-shrink-0">
                    😢 难过
                </div>
            </div>

            <div class="flex items-center space-x-3">
                <div class="flex-1 h-14 neu-inset rounded-2xl px-5 flex items-center">
                    <input type="text" placeholder="此刻在想什么..." class="bg-transparent border-none outline-none text-xs text-gray-600 w-full placeholder-gray-400">
                </div>
                <div class="w-14 h-14 bg-[#7ED321] rounded-2xl flex items-center justify-center shadow-lg shadow-[#7ED321]/30 active:scale-95 transition-transform">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </div>
            </div>
        </footer>
    </div>

</body>
</html>
